name: Daily Job Update (UGA + GA Tech + GA State + Merge)

on:
  # Run every day at 11 AM ET (4 PM UTC) — 5 hours after OneHCM scraper starts
  schedule:
    - cron: '0 16 * * *'

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  update-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # fast scrapers + merge should finish well within an hour
    permissions:
      contents: write   # needed to commit and push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install scraper dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml playwright

      - name: Install Playwright Chromium (for Georgia Tech scraper)
        run: python -m playwright install chromium --with-deps
        continue-on-error: true   # scraper falls back to requests if this fails

      - name: Run UGA scraper
        working-directory: scrapers
        run: python scraper.py
        continue-on-error: true

      - name: Run Georgia Tech scraper
        working-directory: scrapers
        run: python scraper_gatech.py
        continue-on-error: true

      - name: Run Georgia State scraper
        working-directory: scrapers
        run: python scraper_gastate.py
        continue-on-error: true

      - name: Merge all scrapers into usg_all_jobs.csv
        working-directory: scrapers
        run: python merge_all.py

      - name: Build jobs.json for the website
        working-directory: scrapers
        run: python prepare_data.py

      - name: Safety check — only deploy if scrape produced enough jobs
        run: |
          NEW=$(python3 -c "import json; d=json.load(open('scrapers/jobs.json')); print(d['meta']['total'])")
          OLD=$(python3 -c "import json; d=json.load(open('jobs.json')); print(d.get('meta',{}).get('total',0))" 2>/dev/null || echo 0)
          echo "New scrape: $NEW jobs  |  Existing: $OLD jobs"
          # Require at least 500 jobs AND no more than 50% drop vs existing data
          if [ "$NEW" -lt 500 ]; then
            echo "::warning::Scrape produced only $NEW jobs — too few to be reliable. Keeping existing data."
            exit 1
          fi
          THRESHOLD=$(( OLD * 50 / 100 ))
          if [ "$NEW" -lt "$THRESHOLD" ]; then
            echo "::warning::New count ($NEW) is less than 50% of existing ($OLD). Keeping existing data."
            exit 1
          fi
          cp scrapers/jobs.json jobs.json
          echo "DEPLOY=true" >> $GITHUB_ENV

      - name: Install embedding dependencies
        if: env.DEPLOY == 'true'
        run: pip install fastembed numpy

      - name: Generate job embeddings
        if: env.DEPLOY == 'true'
        run: python generate_embeddings.py

      - name: Commit and push all updates
        if: env.DEPLOY == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs.json job_embeddings.bin job_embeddings_meta.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            TOTAL=$(python3 -c "import json; d=json.load(open('jobs.json')); print(d['meta']['total'])")
            git commit -m "Auto-update jobs data: ${TOTAL} listings [skip ci]"
            git push
          fi
