name: Update Job Embeddings (legacy — disabled)
# This workflow is superseded by update_jobs.yml which runs scrapers + embeddings daily.
# Kept here for reference only. The push trigger on jobs.json is preserved so that
# if jobs.json is ever updated manually, embeddings still regenerate automatically.

on:
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

  # Also run whenever jobs.json is updated by a push
  push:
    branches: [main]
    paths:
      - 'jobs.json'

jobs:
  generate-embeddings:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit and push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install fastembed numpy

      - name: Generate embeddings
        run: python generate_embeddings.py

      - name: Commit and push updated embeddings
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add job_embeddings.bin job_embeddings_meta.json
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to embeddings — skipping commit."
          else
            git commit -m "Auto-update job embeddings [skip ci]"
            git push
          fi
