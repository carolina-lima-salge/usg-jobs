name: Update Job Embeddings

on:
  # Run every Monday at 6 AM ET (after scrapers have had time to run)
  schedule:
    - cron: '0 11 * * 1'

  # Also run whenever jobs.json is updated (e.g. after a manual scraper run)
  push:
    branches: [main]
    paths:
      - 'jobs.json'

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  generate-embeddings:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit and push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install fastembed numpy

      - name: Generate embeddings
        run: python generate_embeddings.py

      - name: Commit and push updated embeddings
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add job_embeddings.bin job_embeddings_meta.json
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to embeddings — skipping commit."
          else
            git commit -m "Auto-update job embeddings [skip ci]"
            git push
          fi
